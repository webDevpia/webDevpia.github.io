          - generic [ref=e409]:
            - code [ref=e412]: "const STORAGE_KEY = 'movie_favorites'; /** * 즐겨찾기 목록을 반환합니다. * @returns {Array<{id: number, title: string, poster_path: string, vote_average: number}>} */ export const getFavorites = () => { try { const data = localStorage.getItem(STORAGE_KEY); return data ? JSON.parse(data) : []; } catch { return []; } }; /** * 영화를 즐겨찾기에 추가합니다. 중복은 무시합니다. * @param {Object} movie - {id, title, poster_path, vote_average} */ export const addFavorite = (movie) => { const favorites = getFavorites(); if (favorites.some((fav) => fav.id === movie.id)) return; favorites.push(movie); localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites)); }; /** * 영화를 즐겨찾기에서 제거합니다. * @param {number} id */ export const removeFavorite = (id) => { const favorites = getFavorites().filter((fav) => fav.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites)); }; /** * 해당 id의 영화가 즐겨찾기에 있는지 확인합니다. * @param {number} id * @returns {boolean} */ export const isFavorite = (id) => { return getFavorites().some((fav) => fav.id === id); };"
