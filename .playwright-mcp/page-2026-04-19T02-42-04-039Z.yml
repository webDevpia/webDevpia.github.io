          - generic [ref=e248]:
            - code [ref=e251]: "# 영화 검색 앱 요구사항 ## 핵심 기능 ### 1. 영화 검색 - 영화 제목을 한국어 또는 영어로 입력할 수 있다 - 검색 버튼 클릭 또는 Enter 키로 검색한다 - 검색 중에는 로딩 표시를 보여준다 ### 2. 검색 결과 표시 - 검색 결과를 카드 그리드로 표시한다 - 각 카드에는 포스터 이미지, 제목, 평점, 개봉연도를 표시한다 - 포스터 이미지가 없는 영화는 대체 이미지를 표시한다 - 검색 결과 총 건수를 표시한다 - 평점은 소수점 1자리까지 표시한다 (예: 8.5) ### 3. 에러 처리 - 검색 결과가 없으면: \"검색 결과가 없습니다. 다른 제목으로 검색해보세요.\" - 네트워크 오류: \"영화 정보를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.\" - 빈 검색어: 검색하지 않고 \"영화 제목을 입력해주세요.\" 안내 ### 4. 즐겨찾기 (워치리스트) - 각 영화 카드에 즐겨찾기 버튼이 있다 - 즐겨찾기한 영화는 localStorage에 저장된다 - 즐겨찾기 목록을 별도 영역에 표시한다 - 이미 즐겨찾기한 영화는 버튼 스타일이 다르다 (♥ vs ♡) ## 기술 요구사항 - 파일 구조: src/api.js, src/favorites.js, src/app.js - 테스트: tests/api.test.js, tests/favorites.test.js - API 키는 환경변수(.env)에 저장 - ESM(import/export) 사용"
