          - generic [ref=e464]:
            - code [ref=e467]: "const BASE_URL = 'https://api.themoviedb.org/3'; const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500'; /** * TMDB API로 영화를 검색합니다. * @param {string} query - 검색할 영화 제목 * @returns {Promise<{movies: Array, totalResults: number}>} */ export const searchMovies = async (query) => { if (!query || !query.trim()) { throw new Error('영화 제목을 입력해주세요'); } const apiKey = import.meta.env.VITE_TMDB_API_KEY; const url = `${BASE_URL}/search/movie?query=${encodeURIComponent(query)}&api_key=${apiKey}&language=ko-KR`; try { const response = await fetch(url); if (!response.ok) { throw new Error(`서버 오류: ${response.status}`); } const data = await response.json(); const movies = data.results.map((movie) => ({ id: movie.id, title: movie.title, posterUrl: movie.poster_path ? `${IMAGE_BASE_URL}${movie.poster_path}` : null, voteAverage: movie.vote_average, releaseDate: movie.release_date, overview: movie.overview, })); return { movies, totalResults: data.total_results, }; } catch (error) { if (error.message.includes('영화 제목')) { throw error; } throw new Error('영화 정보를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.'); } };"
