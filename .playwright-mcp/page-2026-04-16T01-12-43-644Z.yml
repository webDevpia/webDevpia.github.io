          - generic [ref=e78]:
            - heading "VS Code용 한국어 팩" [level=1] [ref=e79]
            - paragraph [ref=e80]: 한국어 팩은 현지화된 VS Code용 UI 환경을 제공합니다.
            - heading "사용법" [level=2] [ref=e81]
            - paragraph [ref=e82]:
              - text: "\"표시 언어 구성\" 명령을 사용하여 VS Code 표시 언어를 명시적으로 설정함으로써 기본 UI 언어를 재정의할 수 있습니다. \"Ctrl+Shift+P\"를 눌러 \"명령 팔레트\"를 표시한 후 \"표시\"를 입력하기 시작하여 \"표시 언어 구성\" 명령을 필터링 및 표시합니다. \"Enter\" 키를 누르면 현재 로캘이 강조 표시된 상태로 로캘별로 설치된 언어의 목록이 표시됩니다. UI 언어를 전환하려면 다른 \"로캘\"을 선택합니다. 자세한 내용은"
              - link "Docs" [ref=e83] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/?LinkId=761051
              - text: 를 참조하세요.
            - heading "기여" [level=2] [ref=e84]
            - paragraph [ref=e85]:
              - text: 번역 개선 사항에 대한 피드백이 있는 경우
              - link "vscode-loc" [ref=e86] [cursor=pointer]:
                - /url: https://github.com/microsoft/vscode-loc
              - text: 리포지토리에서 이슈를 만드세요. 번역 문자열은 Microsoft 현지화 플랫폼에서 유지 관리됩니다. Microsoft 현지화 플랫폼에서만 내용을 변경할 수 있으며, 변경한 후 vscode-loc 리포지토리로 내보낼 수 있습니다. 따라서 vscode-loc 리포지토리에서 끌어오기 요청은 허용되지 않습니다.
            - heading "라이선스" [level=2] [ref=e87]
            - paragraph [ref=e88]:
              - text: 소스 코드 및 문자열은
              - link "MIT" [ref=e89] [cursor=pointer]:
                - /url: https://github.com/Microsoft/vscode-loc/blob/master/LICENSE.md
              - text: 라이선스에 따라 사용이 허가됩니다.
            - heading "크레딧" [level=2] [ref=e90]
            - paragraph [ref=e91]: 한국어 팩은 "커뮤니티에 의한, 커뮤니티를 위한" 커뮤니티 현지화 노력의 산물입니다.
            - paragraph [ref=e92]: 도움을 주신 커뮤니티 기여자분들께 진심으로 감사드립니다.
