            - heading "Korean Language Pack for VS Code" [level=1] [ref=e114]
            - paragraph [ref=e115]: Korean Language Pack provides localized UI experience for VS Code.
            - heading "Usage" [level=2] [ref=e116]
            - paragraph [ref=e117]:
              - text: You can override the default UI language by explicitly setting the VS Code display language using the
              - strong [ref=e118]: Configure Display Language
              - text: command.
            - paragraph [ref=e119]:
              - text: Press
              - code [ref=e120]: Ctrl+Shift+P
              - text: to bring up the
              - strong [ref=e121]: Command Palette
              - text: then start typing
              - code [ref=e122]: display
              - text: to filter and display the
              - strong [ref=e123]: Configure Display Language
              - text: command.
            - paragraph [ref=e124]:
              - text: Press
              - code [ref=e125]: Enter
              - text: and a list of installed languages by locale is displayed, with the current locale highlighted. Select another
              - code [ref=e126]: locale
              - text: to switch UI language.
            - paragraph [ref=e127]:
              - text: See
              - link "Docs" [ref=e128] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/?LinkId=761051
              - text: for more information.
            - heading "Contributing" [level=2] [ref=e129]
            - paragraph [ref=e130]:
              - text: For feedback of translation improvement, please create Issue in
              - link "vscode-loc" [ref=e131] [cursor=pointer]:
                - /url: https://github.com/microsoft/vscode-loc
              - text: repo.
            - paragraph [ref=e132]: The translation strings are maintained in Microsoft Localization Platform. Change can only be made in Microsoft Localization Platform then export to vscode-loc repo. So pull request won't be accepted in vscode-loc repo.
