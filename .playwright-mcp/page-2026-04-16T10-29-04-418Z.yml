          - text: 시스템을 통해 누구나 쉽게 워크플로를 서비스로 전환할 수 있도록 지원합니다.
        - paragraph [ref=e419]: 쉽고 간편한 방식으로, 나만의 에이전트를 전 세계 사용자에게 제공할 수 있습니다.
        - paragraph [ref=e420]: 또한 기업 수준의 환경에서는 보안과 규제 준수를 위해 온프레미스(On-Premise) 배포를 지원합니다.
        - paragraph [ref=e421]: 온프레미스 배포 시, 별도의 앱 개발 없이 자체적인 사용자 관리 기능을 통해 기업 내부 규칙과 보안 정책에 맞춘 통합 운영이 가능합니다.
        - paragraph [ref=e422]: 이처럼, 하이브리드 옵션을 통해 개인부터 스타트업, 대규모 기업까지 각 사용자의 요구와 환경에 최적화된 선택지를 제공합니다.
