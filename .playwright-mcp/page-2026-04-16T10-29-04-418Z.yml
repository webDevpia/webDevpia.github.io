        - paragraph [ref=e378]: 우리는 개인과 기업이 자신만의 에이전트를 쉽게 만들고, 자유롭게 활용하며, 수익화할 수 있는 글로벌 생태계 구축을 목표로 합니다.
        - paragraph [ref=e379]:
