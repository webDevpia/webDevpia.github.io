          - generic [ref=e225]:
            - code [ref=e228]: "# 날씨 앱 요구사항 ## 핵심 기능 ### 1. 날씨 검색 - 사용자가 도시 이름을 한국어 또는 영어로 입력할 수 있다 - 검색 버튼 클릭 또는 Enter 키로 검색한다 - 검색 중에는 로딩 표시를 보여준다 ### 2. 날씨 정보 표시 - 도시명, 날씨 아이콘, 온도(°C), 날씨 설명을 표시한다 - 온도는 소수점 없이 정수로 표시한다 (예: 25°C) - 날씨 설명은 한국어로 표시한다 (예: 맑음, 흐림, 비) ### 3. 에러 처리 - 존재하지 않는 도시명: \"도시를 찾을 수 없습니다. 영문 도시명으로 검색해보세요.\" - 네트워크 오류: \"날씨 정보를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.\" - 빈 검색어: 검색하지 않고 \"도시명을 입력해주세요.\" 안내 ### 4. 최근 검색 기록 - 성공한 검색의 도시명을 저장한다 (최대 5개) - localStorage를 사용한다 - 검색 기록을 클릭하면 다시 검색한다 - 중복 도시는 저장하지 않는다 (최신 것을 앞에 배치) ## 기술 요구사항 - 파일 구조: src/api.js, src/storage.js, src/app.js - 테스트: tests/api.test.js, tests/storage.test.js - API 키는 환경변수(.env)에 저장 - ESM(import/export) 사용"
