          - generic [ref=e437]:
            - code [ref=e440]: "const BASE_URL = 'https://api.openweathermap.org/data/2.5'; /** * OpenWeatherMap API로 도시의 현재 날씨를 가져옵니다. * @param {string} city - 검색할 도시명 * @returns {Promise<{city: string, temperature: number, description: string, icon: string}>} */ export const fetchWeather = async (city) => { if (!city || !city.trim()) { throw new Error('도시명을 입력해주세요'); } const apiKey = process.env.WEATHER_API_KEY; const url = `${BASE_URL}/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric&lang=ko`; try { const response = await fetch(url); if (!response.ok) { if (response.status === 404) { throw new Error('도시를 찾을 수 없습니다. 영문 도시명으로 검색해보세요.'); } throw new Error(`서버 오류: ${response.status}`); } const data = await response.json(); return { city: data.name, temperature: Math.round(data.main.temp), description: data.weather[0].description, icon: data.weather[0].icon }; } catch (error) { if (error.message.includes('도시를') || error.message.includes('도시명')) { throw error; } throw new Error(`날씨 정보를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.`); } };"
