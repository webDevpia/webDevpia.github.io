          - generic [ref=e391]:
            - code [ref=e394]: "const STORAGE_KEY = 'weather_search_history'; const MAX_HISTORY = 5; /** * 검색 기록을 localStorage에 저장합니다. * 중복은 제거하고 최신을 앞에 배치합니다. * 최대 5개까지만 저장합니다. * @param {string} city - 저장할 도시명 */ export const saveSearch = (city) => { const history = getHistory(); // 중복 제거 const filtered = history.filter((item) => item !== city); // 최신을 앞에 추가 const updated = [city, ...filtered].slice(0, MAX_HISTORY); localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); }; /** * 저장된 검색 기록을 반환합니다. * @returns {string[]} 도시명 배열 (최신 순) */ export const getHistory = () => { try { const data = localStorage.getItem(STORAGE_KEY); return data ? JSON.parse(data) : []; } catch { return []; } }; /** * 모든 검색 기록을 삭제합니다. */ export const clearHistory = () => { localStorage.removeItem(STORAGE_KEY); };"
