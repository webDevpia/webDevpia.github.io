 '독서', completed: false }, ]; }); it('\"all\" 필터는 전체 배열을 반환한다', () => { expect(filterTodos(todos, 'all')).toHaveLength(3); }); it('\"completed\" 필터는 완료된 항목만 반환한다', () => { const result = filterTodos(todos, 'completed'); expect(result).toHaveLength(1); expect(result[0].text).toBe('공부'); }); it('\"active\" 필터는 미완료 항목만 반환한다', () => { const result = filterTodos(todos, 'active'); expect(result).toHaveLength(2); }); });"
