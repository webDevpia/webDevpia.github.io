      - generic [ref=e369]:
        - 'heading "API : 시스템 간 상호작용을 위한 인터페이스" [level=2] [ref=e370]':
          - 'link "API : 시스템 간 상호작용을 위한 인터페이스" [ref=e371] [cursor=pointer]':
            - /url: ./api-ko#api-%EC%8B%9C%EC%8A%A4%ED%85%9C-%EA%B0%84-%EC%83%81%ED%98%B8%EC%9E%91%EC%9A%A9%EC%9D%84-%EC%9C%84%ED%95%9C-%EC%9D%B8%ED%84%B0%ED%8E%98%EC%9D%B4%EC%8A%A4
        - paragraph [ref=e372]
        - paragraph [ref=e373]:
          - strong [ref=e374]: Agentria
          - text: 의 API(Application Programming Interface)는 서로 다른 소프트웨어나 서비스가 표준화된 방식으로 소통할 수 있도록 제공되는 인터페이스입니다.
        - paragraph [ref=e375]: API는 특정 기능이나 데이터를 외부에 공개해 다른 프로그램이 이를 호출하고 활용할 수 있게 해줍니다.
        - paragraph [ref=e376]: 예를 들어, OpenAI API를 통해 텍스트 생성 기능을 사용하거나, Google Maps API를 호출해 지도 데이터를 불러올 수 있습니다.
        - paragraph [ref=e377]: 이때 API는 요청(Request)과 응답(Response) 형식으로 동작하며, 정해진 규칙에 따라 데이터를 교환합니다.
        - paragraph [ref=e378]: API는 단순한 데이터 통로가 아니라, 시스템 간의 재사용성과 확장성을 보장하는 핵심 요소입니다.
        - paragraph [ref=e379]
        - heading "API의 주요 기능 및 장점" [level=2] [ref=e380]:
          - link "API의 주요 기능 및 장점" [ref=e381] [cursor=pointer]:
            - /url: ./api-ko#api%EC%9D%98-%EC%A3%BC%EC%9A%94-%EA%B8%B0%EB%8A%A5-%EB%B0%8F-%EC%9E%A5%EC%A0%90
        - paragraph [ref=e382]
        - paragraph [ref=e383]: API를 활용하면 내부 기능을 직접 구현하지 않고도 외부 서비스의 기능을 가져올 수 있습니다.
        - paragraph [ref=e384]: 이를 통해 개발 속도를 높이고, 다양한 서비스를 손쉽게 연동할 수 있습니다.
        - paragraph [ref=e385]: 또한, API는 일관된 규칙을 제공하기 때문에 플랫폼 간 호환성이 뛰어나며, 변화에 유연하게 대응할 수 있습니다.
        - paragraph [ref=e386]: 서비스별 API를 모듈화해 관리하면 프로젝트 규모가 커져도 유지보수가 용이하고, 코드 품질을 향상시킬 수 있습니다.
        - paragraph [ref=e387]:
          - strong [ref=e388]: Agentria
          - text: 는 API 호출 기능을 통해 사용자가 간단한 설정만으로 외부 서비스와 연결할 수 있도록 지원합니다.
        - paragraph [ref=e389]: 이를 통해 사용자는 직접 복잡한 네트워크 코드를 작성하지 않고도 워크플로우에 다양한 기능을 쉽게 통합할 수 있습니다.
        - paragraph [ref=e390]
