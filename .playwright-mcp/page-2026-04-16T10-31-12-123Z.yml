            - /url: ./credential-ko#%ED%81%AC%EB%A6%AC%EB%8D%B4%EC%85%9C-%EC%84%9C%EB%B9%84%EC%8A%A4-%EC%A0%91%EA%B7%BC%EC%9D%84-%EC%9C%84%ED%95%9C-%EC%9E%90%EA%B2%A9-%EC%A6%9D%EB%AA%85
        - paragraph [ref=e372]
        - paragraph [ref=e373]:
          - strong [ref=e374]: Agentria
          - text: 의 크리덴셜(Credential)은 외부 서비스나 리소스에 안전하게 접근하기 위해 필요한 자격 증명 정보입니다. API 키, 인증 토큰, 비밀번호, 인증서 등이 크리덴셜에 해당하며, 이를 통해 시스템은 사용자를 식별하고 접근 권한을 검증합니다.
        - paragraph [ref=e375]: "외부 API를 호출하거나(예: Google의 특정 서비스를 사용) 데이터베이스, 클라우드 스토리지 등과 연동할 때는 반드시 유효한 크리덴셜이 필요합니다."
        - paragraph [ref=e376]: 크리덴셜이 없으면 시스템이 접근 권한을 확인할 수 없어 요청이 거부되거나, 워크플로우가 정상적으로 실행되지 않을 수 있습니다.
        - paragraph [ref=e377]: 즉, 크리덴셜은 외부 서비스와 안전하게 데이터를 주고받고, 자동화를 안정적으로 운영하기 위한 필수 요소라고 할 수 있습니다.
        - paragraph [ref=e378]
